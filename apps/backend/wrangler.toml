name = "breakpoint-backend"
main = "src/index.ts"
compatibility_date = "2025-06-01"
compatibility_flags = ["nodejs_compat"]

# Durable Object binding for session coordination.
[[durable_objects.bindings]]
name = "SESSION_DO"
class_name = "SessionDO"

# A new DO class must be declared in a migration (step 2.0 stub class).
[[migrations]]
tag = "v1"
new_sqlite_classes = ["SessionDO"]

# D1 — anonymous device identity (V2 Phase 1). Additive; the DO/session is
# untouched. Migrations live in ./migrations.
[[d1_databases]]
binding = "DB"
database_name = "breakpoint-db"
database_id = "59de8d7f-5473-4c67-8e73-c84f1d3c2399"
migrations_dir = "migrations"
